    <script>
        function loadPanel(evt, panelName) {
            const tabContainer = evt.currentTarget.closest('.tab-container');

            var i, tabcontent, tablinks;
            tabcontent = tabContainer.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }

            tablinks = tabContainer.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }

            document.getElementById(panelName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("defaultOpen").click();
            document.getElementById("defaultSkills").click();
        })

        document.addEventListener('DOMContentLoaded', () => {
            const filterSelect = document.getElementById('projectFilter');
            const cards = document.querySelectorAll('.card');

            filterSelect.addEventListener('change', function () {
                const selectedTag = this.value;

                cards.forEach(card => {
                    // Get the data-tags string, fallback to empty string if missing
                    const cardTagsStr = card.getAttribute('data-tags') || '';

                    // Split by space to get an array of tags: ['modeling', 'se']
                    const cardTags = cardTagsStr.toLowerCase().split(' ');

                    if (selectedTag === 'all' || cardTags.includes(selectedTag.toLowerCase())) {
                        // Show the card by removing Bootstrap's display-none class
                        card.classList.remove('d-none');
                    } else {
                        // Hide the card by adding Bootstrap's display-none class
                        card.classList.add('d-none');
                    }
                });
            });
        });
    </script>
